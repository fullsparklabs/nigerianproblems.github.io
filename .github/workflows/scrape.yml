name: Scrape and Update Nigerian Problems

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      year_range:
        description: 'Year range to scrape (e.g., 1960-1970, 2020-2024, or all)'
        required: false
        default: 'all'
        type: string

env:
  OLLAMA_BASE_URL: http://localhost:11434
  OLLAMA_MODEL: qwen2.5:1.5b
  PYTHON_VERSION: '3.11'

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama service
        run: |
          ollama serve &
          sleep 10
          echo "Ollama started"

      - name: Pull Qwen model
        run: |
          ollama pull qwen2.5:1.5b  # Smaller model for CI
        timeout: 600000

      - name: Verify Ollama is ready
        run: |
          curl -f http://localhost:11434/api/tags

      - name: Run web scraper
        env:
          YEAR_RANGE: ${{ github.event.inputs.year_range || 'all' }}
        run: |
          cd scripts
          python scraper.py

      - name: Generate blog posts from scraped data
        env:
          YEAR_RANGE: ${{ github.event.inputs.year_range || 'all' }}
        run: |
          cd scripts
          python generate_posts.py

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit and push changes
        run: |
          git add _problems/
          git add _data/
          git diff --staged --quiet || git commit -m "Update: Add new scraped problems ($(date +%Y-%m-%d))"
          git push

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
